# Render Blueprint — one-click deploy of the EOC Assistant.
# In Render: New + → Blueprint → connect this repo. Render reads this file.
# Secrets (sync:false) are entered once in the Render dashboard, never committed.
services:
  - type: web
    name: eoc-assistant
    runtime: node
    plan: free               # $0 — sleeps when idle; leads/Q&A reset on redeploy.
                             # To make leads permanent later: change to "starter" and
                             # re-add the DATA_DIR env + disk block (see DEPLOY.md).
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true         # redeploy on every push to the connected branch
    envVars:
      # KB artifacts (data/kb.json, data/standard.json) ship in the repo and are
      # read from there. On free there is no persistent disk, so leads + shared Q&A
      # are written under the app's data/ folder and reset on redeploy.
      - key: ANTHROPIC_API_KEY   # required — set in the dashboard
        sync: false
      - key: LEADS_ADMIN_KEY     # required to enable the /leads/export CSV
        sync: false
      - key: PREMIUM_LICENSE_KEYS # optional — comma-separated keys; blank = premium open
        sync: false
      - key: EOC_MODEL           # optional — defaults to claude-opus-4-8
        sync: false
